<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign in · LifeKanban</title>
<style>
  :root{ --blue:#3b6cf6; --ink:#1d2330; --muted:#6b7385; --line:#e4e7ef; --bg:#f7f8fb; }
  *{box-sizing:border-box}
  body{font:15px/1.5 -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--ink);
       background:var(--bg);margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:34px 32px;
        width:100%;max-width:380px;box-shadow:0 8px 30px rgba(20,30,60,.08)}
  h1{font-size:21px;margin:0 0 4px}
  p.sub{color:var(--muted);margin:0 0 22px;font-size:13.5px}
  label{display:block;font-size:12.5px;color:var(--muted);margin:14px 0 6px;font-weight:600}
  input{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:9px;font-size:15px;background:#fff}
  input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(59,108,246,.15)}
  button{width:100%;margin-top:22px;padding:12px;background:var(--blue);color:#fff;border:0;
         border-radius:9px;font-size:15px;font-weight:600;cursor:pointer}
  button:disabled{opacity:.6;cursor:default}
  .err{color:#c0392b;background:#fdecea;border:1px solid #f5c6c0;border-radius:8px;
       padding:9px 12px;font-size:13px;margin-top:16px;display:none}
  .brand{font-weight:700;letter-spacing:-.2px}
</style>
</head>
<body>
  <form class="card" id="f">
    <h1><span class="brand">LifeKanban</span></h1>
    <p class="sub">Sign in to your board.</p>
    <label for="u">Username</label>
    <input id="u" name="username" autocomplete="username" autofocus required>
    <label for="p">Password</label>
    <input id="p" name="password" type="password" autocomplete="current-password" required>
    <div class="err" id="err"></div>
    <button id="btn" type="submit">Sign in</button>
  </form>
<script>
  // If already signed in, go straight to the board.
  fetch('/api/me',{cache:'no-store'}).then(function(r){ if(r.ok) location.replace('/'); }).catch(function(){});

  var f=document.getElementById('f'), err=document.getElementById('err'), btn=document.getElementById('btn');
  f.addEventListener('submit', function(e){
    e.preventDefault(); err.style.display='none'; btn.disabled=true; btn.textContent='Signing in…';
    fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({username:document.getElementById('u').value,
                           password:document.getElementById('p').value})})
      .then(function(r){ return r.json().then(function(j){ return {ok:r.ok, j:j}; }); })
      .then(function(res){
        if(!res.ok){ throw new Error(res.j.error||'Sign in failed'); }
        if(res.j.user && res.j.user.must_change){ location.replace('/settings.html'); }
        else location.replace('/');
      })
      .catch(function(ex){ err.textContent=ex.message; err.style.display='block';
        btn.disabled=false; btn.textContent='Sign in'; });
  });
</script>
</body>
</html>
