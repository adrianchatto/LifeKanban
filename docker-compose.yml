# Run the Kanban board in Docker:
#   docker compose up -d --build
# then open http://localhost:8787
#
# Data (board.json + results) lives in the named volume "kanban-data" so it
# survives rebuilds. To keep data in the repo folder instead, swap the volume
# line for a bind mount, e.g.:   - ./:/data
services:
  kanban:
    build: .
    image: lifekanban:latest
    # Build this image locally — never try to pull it from a registry (it isn't
    # published anywhere). This stops "pull access denied for lifekanban" when a
    # stack deployer (e.g. Portainer) would otherwise pull before starting.
    pull_policy: build
    container_name: lifekanban
    ports:
      - "8787:8787"
    environment:
      KANBAN_HOST: "0.0.0.0"
      KANBAN_PORT: "8787"
      KANBAN_DATA: "/data"
      # Optional first-run admin bootstrap. You can leave these unset and use
      # Sign up in the browser instead; the first signup becomes the admin.
      # Once users.json exists in the volume these are ignored.
      # KANBAN_ADMIN_USER: "Ch@o"
      # KANBAN_ADMIN_PASSWORD: "set-a-real-password"
      # Served behind HTTPS (https://kanban.chattoweb.com), so mark session
      # cookies Secure. NOTE: with this on, logins only work over HTTPS — reach
      # the board via the domain, not http://<ip>:8787 directly. Set to "0" if
      # you ever need plain-http access again.
      KANBAN_SECURE_COOKIES: "1"
      # Optional: the admin "User guide" link target.
      # KANBAN_GUIDE_URL: "https://app.notion.com/p/3798568cba8981dbbbf4d069543641e4"
    volumes:
      - kanban-data:/data
    restart: unless-stopped

volumes:
  kanban-data:
